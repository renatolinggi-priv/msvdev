<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>MSV Wilen</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background:#f5f6fa; color:#334;
           display:flex; min-height:100vh; align-items:center; justify-content:center; margin:0; text-align:center; }
    .box { max-width: 360px; padding: 0 1.5rem; }
    .spin { width:36px; height:36px; border:4px solid #d7e2ff; border-top-color:#3b5998;
            border-radius:50%; animation:r 0.9s linear infinite; margin:0 auto 1rem; }
    @keyframes r { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Wird nur angezeigt, falls die Live-Site (server.url) nicht erreichbar ist.
       Im Normalbetrieb laedt Capacitor direkt https://mitglieder.msvwilen.ch -->
  <div class="box">
    <div class="spin"></div>
    <p>MSV Wilen wird geladen…</p>
    <p style="color:#889; font-size:.85rem">Keine Verbindung? Bitte Internet prüfen und App neu starten.</p>
  </div>
</body>
</html>
